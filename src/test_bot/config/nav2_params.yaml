bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered_odom
    default_bt_xml_filename: "/opt/nav2_ws/install/nav2_bt_navigator/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node

planner_server:
  ros__parameters:
    use_sim_time: false
    # Jetson Nano: el BT replanifica a ~1 Hz (RateController del arbol
    # navigate_w_replanning_and_recovery). Ponerlo en 5.0 solo generaba
    # warnings de "planner missed its desired rate" bajo carga; 1.0 refleja
    # la realidad y evita ese ruido. NavFn sobre un mapa chico es barato.
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # Si el punto exacto del goal es invalido (colision/inflado), NavFn
      # busca en espiral dentro de este radio un punto alcanzable y planifica
      # AHI en su lugar -- silenciosamente, sin avisar. Con 0.30 (mayor que el
      # propio robot_radius) el punto final real podia terminar hasta 30cm
      # lejos de donde el usuario arrastro el goal en la GUI, y el robot
      # "llegaba" ahi en vez de al circulo dibujado. Bajado a 0.05: solo el
      # margen justo para bordes/redondeo, sin desplazar el objetivo real.
      tolerance: 0.1
      use_astar: true            # dirigido -> explora menos nodos que Dijkstra
      allow_unknown: false

controller_server:
  ros__parameters:
    use_sim_time: false
    # 20 Hz resulto demasiado para el Nano: el costo FIJO por ciclo
    # (costmap/TF/critic setup, independiente de vx/vtheta_samples) corria 4x
    # mas seguido que a 5 Hz y saturaba la CPU compartida con camara+aruco+EKF.
    # 10 Hz es el punto medio: la mitad de ese costo fijo vs 20 Hz, y el doble
    # de reactivo que la base original de 5 Hz.
    controller_frequency: 10.0
    odom_topic: /odometry/filtered_odom
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # xy_goal_tolerance es la distancia CENTRO del robot -> punto del goal,
      # no borde-a-borde. Con un valor chico (0.01-0.04, lo que habia antes)
      # el CENTRO tiene que casi coincidir con el goal, lo cual en la practica
      # nunca se veia "temprano" -- el problema real era el planner.tolerance
      # de 0.30 (arriba) corriendo el punto final lejos del goal pedido.
      # Debe editarse junto con FollowPath.xy_goal_tolerance mas abajo EN
      # ESTE ARCHIVO: rcl_yaml_param_parser de Foxy NO soporta anchors/alias
      # de YAML ("Will not support aliasing"), asi que no se puede compartir
      # el valor con &/* -- eso crashea TODOS los nodos nav2 que cargan este
      # archivo (fue justo lo que paso). 0.10 ~ media-anchura del footprint
      # (0.11): "goal alcanzado" = el cuerpo del robot toca el punto del goal.
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.3
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: -0.1
      min_vel_y: -0.1
      # Laberinto: pasillos de 0.30m vs robot de 0.20m de ancho -> 5cm de
      # margen fisico TOTAL por lado. A 0.3 m/s y 10 Hz el robot avanza 3cm
      # por ciclo de control (mas de medio margen); a 0.15 m/s son 1.5cm y
      # el DWB alcanza a corregir antes de tocar pared.
      max_vel_x: 0.1
      max_vel_y: 0.1
      max_vel_theta: 0.9
      min_speed_xy: -0.1
      max_speed_xy: 0.15
      min_speed_theta: 0.0
      acc_lim_x: 0.5
      acc_lim_y: 0.5
      acc_lim_theta: 1.2
      decel_lim_x: -0.5
      decel_lim_y: -0.5
      decel_lim_theta: -1.2
      # --- Presupuesto de CPU del DWB (lo mas caro del stack en el Nano) ---
      # El costo de SIMULACION escala como vx_samples*vtheta_samples*
      # controller_frequency; a 10 Hz (mitad de los 20 Hz que no andaban)
      # subimos a 5*6=30 (450 sim/seg), todavia muy por debajo del 12*20=240
      # original (1200 sim/seg) pero con mejor resolucion que el 3*5=15 usado
      # a 20 Hz. El costo FIJO por ciclo (costmap/TF/critics, no escala con
      # samples) ya se redujo a la mitad al bajar la frecuencia -- ese era el
      # problema real, no la cantidad de samples.
      vx_samples: 15
      vy_samples: 15
      vtheta_samples: 20
      sim_time: 2.0
      linear_granularity: 0.020
      # angular_granularity 0.025 -> 0.05: menos puntos por trayectoria donde
      # evaluan los critics (costo ~ largo/granularity). Impacto minimo en
      # calidad de giro, buen ahorro de CPU.
      angular_granularity: 0.025
      # Tolerante a jitter de TF cuando la CPU esta cargada (evita abortar el
      # control por "transform timeout").
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.10    # = goal_checker.xy_goal_tolerance (deben ir juntos)
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.10
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.10
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      # OJO: el nombre correcto del parametro es ObstacleFootprint.scale
      # (antes decia "ObstacleFootprint: 0.5", que nav2 ignora en silencio).
      # Este critic es el freno duro contra paredes: ademas del puntaje,
      # RECHAZA (excepcion -> trayectoria ilegal) cualquier trayectoria cuyo
      # footprint pise una celda letal del local costmap, sin importar scale.
      ObstacleFootprint.scale: 1.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      # Solo se publica para visualizar (RViz); el host carga el mapa local.
      # Bajarlo a 0.5 Hz reduce serializacion DDS del grid completo sin afectar
      # la navegacion (el costmap interno se sigue actualizando a 1 Hz).
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      # Footprint REAL del robot v2 (mesh CAD en robot_core.xacro), relativo
      # a base_link (centro del eje): placa x en [-0.047, 0.123] con la
      # camara sobresaliendo hasta x=0.129, ruedas hasta y=+/-0.098; todo
      # + ~1cm de margen -> frente 0.14, lados +/-0.11, cola -0.06.
      # Antes: robot_radius 0.22 -> circulo de 0.44m que NO CABE en los
      # pasillos de 0.30m del laberinto; el unico motivo por el que "andaba"
      # era que inflation_radius (0.10) < robot_radius, lo que dejaba sin
      # marcar la banda letal alrededor de las paredes y desactivaba de
      # facto toda la deteccion de colisiones del planner.
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.06, -0.11], [-0.06, 0.11]]"
      resolution: 0.05
      track_unknown_space: false
      # TF map->base viene del EKF; margen amplio para no fallar bajo carga.
      transform_tolerance: 1.0
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius DEBE ser mayor que la media-anchura del robot
        # (0.11); si no, la banda letal junto a las paredes queda sin marcar
        # (el bug que causo el choque). 0.30 ademas crea un gradiente de
        # costo que empuja los planes de NavFn al CENTRO de los pasillos:
        # en un pasillo de 0.30m el centro queda a 0.15m de cada pared,
        # costo alto pero transitable, y siempre menor que pegado a la pared.
        cost_scaling_factor: 10.0
        inflation_radius: 0.1
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 1.0     # solo viz; sin lidar el local costmap casi no cambia
      # ANTES este costmap era una ventana rodante de 1x1m en frame odom con
      # SOLO inflation_layer y NINGUNA fuente de obstaculos (no hay lidar):
      # una grilla VACIA. El critic ObstacleFootprint del DWB evaluaba contra
      # eso, asi que el controlador veia todas las trayectorias como libres
      # y podia estamparse contra cualquier pared sin enterarse.
      # Sin sensor de obstaculos, la UNICA fuente de paredes es el mapa
      # estatico -> costmap fijo en frame map con static_layer (el mapa del
      # laberinto es 72x86 celdas, mas barato incluso que la ventana rodante).
      # static_layer con rolling_window:false redimensiona la grilla al mapa,
      # asi que width/height/resolution salen del propio mapa.
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      # Mismo footprint v2 que el global (ver comentario alla).
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.06, -0.11], [-0.06, 0.11]]"
      # TF map->base viene del EKF (igual que el global): margen bajo carga.
      transform_tolerance: 1.0
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Mismo criterio que el global: > media-anchura del robot (0.11) y
        # gradiente que centra al DWB en el pasillo.
        cost_scaling_factor: 10.0
        inflation_radius: 0.1
      always_send_full_costmap: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.3      # mas tolerante a jitter de CPU en el Nano
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.7
    min_rotational_vel: 0.3
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false